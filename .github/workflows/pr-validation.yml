name: Pull Request Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/**'
      - 'package.json'
      - '.husky/**'

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        working-directory: ./apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock flake8 black pylint

      - name: Detect changes
        id: changes
        run: |
          echo "backend=$(git diff origin/main...HEAD --name-only | grep -E 'apps/api|requirements.txt' | wc -l)" >> $GITHUB_OUTPUT
          echo "frontend=$(git diff origin/main...HEAD --name-only | grep -E 'apps/web|packages' | wc -l)" >> $GITHUB_OUTPUT

      - name: Lint frontend
        if: steps.changes.outputs.frontend != '0'
        run: bun run lint

      - name: Check frontend formatting
        if: steps.changes.outputs.frontend != '0'
        run: bun x prettier --check "apps/web/**/*.{ts,tsx}" "packages/**/*.{ts,tsx}"

      - name: Lint backend
        if: steps.changes.outputs.backend != '0'
        working-directory: ./apps/api
        run: |
          flake8 app/ --max-line-length=100 --extend-ignore=E203,W503 || true
          black --check app/ || true

      - name: Run frontend tests
        if: steps.changes.outputs.frontend != '0'
        run: bun run test:frontend -- --passWithNoTests

      - name: Run backend tests
        if: steps.changes.outputs.backend != '0'
        working-directory: ./apps/api
        run: pytest tests/ -v --tb=short || true

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const backend = ${{ steps.changes.outputs.backend }};
            const frontend = ${{ steps.changes.outputs.frontend }};
            let comment = '## ✅ Quality Check Results\n\n';
            
            if (backend > 0) comment += '- ✅ Backend changes detected and checked\n';
            if (frontend > 0) comment += '- ✅ Frontend changes detected and checked\n';
            
            comment += '\n**Note:** Run tests locally with:\n';
            comment += '```bash\nbun run test\n```';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
