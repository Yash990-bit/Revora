name: Scheduled Tests

on:
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-tests:
    name: Nightly Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          npm ci
          cd apps/api
          pip install -r ../requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run comprehensive tests
        run: npm run test -- --coverage

      - name: Run backend linters
        working-directory: ./apps/api
        run: |
          pip install flake8 black pylint
          black --check app/
          flake8 app/
          pylint app/ --disable=all --enable=E || true

      - name: Create test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports-${{ matrix.node-version }}-${{ matrix.python-version }}
          path: |
            apps/web/coverage/
            apps/api/htmlcov/
          retention-days: 30

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: nightly-tests
    if: always()
    
    steps:
      - name: Test Results
        run: |
          if [ "${{ needs.nightly-tests.result }}" = "success" ]; then
            echo "✅ Nightly tests passed"
          else
            echo "❌ Nightly tests failed"
            exit 1
          fi
