version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]

  # Maintain dependencies for Python (Root)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      python:
        patterns: ["*"]

  # Maintain dependencies for Python (API App)
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "monthly"
    groups:
      python-api:
        patterns: ["*"]

  # Maintain dependencies for Bun
  # (Handles root package.json and workspaces in apps/* and packages/*)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      bun-packages:
        patterns: ["*"]
